    <title>Lumière Coffee</title>

    <style>
        /* === RESET & BASE === */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #f5f5f5;
            --surface: rgba(255,255,255,0.85);
            --surface-solid: #ffffff;
            --border: rgba(0,0,0,0.08);
            --text: #111111;
            --text-muted: #666666;
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --primary-light: #e0f2fe;
            --sidebar-w: 220px;
        }
        
        body.dark {
            --bg: #0f172a;
            --surface: rgba(30,41,59,0.85);
            --surface-solid: #1e293b;
            --border: rgba(255,255,255,0.08);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --primary-light: #0c4a6e;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            transition: background 0.3s, color 0.3s;
        }
        
        /* === SIDEBAR === */
        .sidebar {
            width: var(--sidebar-w);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            background: var(--surface-solid);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            flex-shrink: 0;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo-icon {
            width: 40px; height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: white;
            font-size: 20px;
            font-weight: 900;
            display: flex; align-items: center; justify-content: center;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            border: none;
            background: none;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            width: 100%;
            transition: all 0.15s;
        }
        
        .nav-btn:hover { background: var(--primary-light); color: var(--primary); }
        .nav-btn.active { background: var(--primary-light); color: var(--primary); }
        .nav-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
        
        .sidebar-bottom {
            border-top: 1px solid var(--border);
            padding-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .sidebar-util-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            background: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.15s;
        }
        
        .sidebar-util-btn:hover { background: var(--surface); color: var(--text); }
        .sidebar-util-btn svg { width: 18px; height: 18px; }
        
        .lang-badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
        }
        
        .login-btn {
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #111;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s;
        }
        
        body.dark .login-btn { background: white; color: #111; }
        .login-btn:hover { opacity: 0.85; }
        
        .user-info {
            display: none;
            flex-direction: column;
            gap: 4px;
            padding: 10px 14px;
            background: var(--primary-light);
            border-radius: 10px;
        }
        
        .user-email {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            word-break: break-all;
        }
        
        .logout-link {
            font-size: 11px;
            color: #ef4444;
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            padding: 0;
        }
        
        /* === MAIN === */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--surface-solid);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        
        .cart-btn {
            position: relative;
            padding: 10px;
            border-radius: 50%;
            border: none;
            background: var(--surface);
            cursor: pointer;
            transition: all 0.15s;
            display: flex; align-items: center; justify-content: center;
        }
        
        .cart-btn:hover { background: var(--primary-light); }
        .cart-btn svg { width: 22px; height: 22px; color: var(--text); }
        
        .cart-count {
            position: absolute;
            top: -4px; right: -4px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: 800;
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            display: none;
        }
        
        /* === VIEWS === */
        .content { padding: 32px; max-width: 1100px; margin: 0 auto; width: 100%; }
        
        .view { display: none; }
        .view.active { display: block; }
        
        /* === HERO === */
        .hero {
            background: var(--surface-solid);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            display: flex;
            align-items: center;
            gap: 48px;
        }
        
        .hero-text { flex: 1; }
        
        .hero-badge {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 100px;
            margin-bottom: 16px;
        }
        
        .hero h1 {
            font-size: 52px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 16px;
        }
        
        .hero p {
            font-size: 17px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.7;
        }
        
        .hero-img {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid var(--primary-light);
            flex-shrink: 0;
        }
        
        /* === BUTTONS === */
        .btn-primary {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            background: #111;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        body.dark .btn-primary { background: white; color: #111; }
        .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
        
        .btn-blue {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        
        .btn-blue:hover { background: var(--primary-hover); }
        
        /* === MENU === */
        .section-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 24px;
        }
        
        .filter-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        
        .filter-bar::-webkit-scrollbar { height: 4px; }
        .filter-bar::-webkit-scrollbar-track { background: transparent; }
        .filter-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        .filter-chip {
            padding: 8px 18px;
            border-radius: 100px;
            border: 2px solid var(--border);
            background: var(--surface-solid);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        
        .filter-chip:hover, .filter-chip.active {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: var(--surface-solid);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.2s;
        }
        
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.1); }
        
        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        
        .product-body { padding: 16px; }
        .product-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .product-price { font-size: 20px; font-weight: 900; color: var(--primary); margin-bottom: 14px; }
        
        .add-btn {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #f1f5f9;
            color: #111;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        body.dark .add-btn { background: #334155; color: #f1f5f9; }
        .add-btn:hover { background: var(--primary); color: white; }
        
        /* === CART === */
        .cart-layout { display: flex; gap: 24px; align-items: flex-start; }
        .cart-items { flex: 1; }
        .cart-sidebar { width: 300px; flex-shrink: 0; }
        
        .cart-card, .summary-card {
            background: var(--surface-solid);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .cart-item:last-child { border-bottom: none; }
        
        .cart-item-img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .cart-item-price { color: var(--primary); font-weight: 800; font-size: 14px; }
        
        .qty-ctrl {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 4px;
        }
        
        body.dark .qty-ctrl { background: #334155; }
        
        .qty-btn {
            width: 30px; height: 30px;
            border-radius: 6px;
            border: none;
            background: none;
            color: var(--text);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
        }
        
        .qty-btn:hover { background: white; }
        body.dark .qty-btn:hover { background: #475569; }
        
        .qty-num { font-weight: 800; font-size: 15px; min-width: 24px; text-align: center; }
        .cart-item-total { font-weight: 900; font-size: 17px; min-width: 70px; text-align: right; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state svg { width: 64px; height: 64px; margin: 0 auto 16px; opacity: 0.3; }
        
        /* === CHECKOUT === */
        .checkout-layout { display: flex; gap: 24px; align-items: flex-start; }
        .checkout-form { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .checkout-summary-col { width: 300px; flex-shrink: 0; }
        
        .form-card {
            background: var(--surface-solid);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }
        
        .form-card h3 {
            font-size: 17px;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .step-num {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 13px;
            font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        
        .form-field { display: flex; flex-direction: column; gap: 6px; }
        .form-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-input {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
            width: 100%;
            font-family: inherit;
        }
        
        .form-input:focus { border-color: var(--primary); }
        
        .fulfillment-btns { display: flex; gap: 12px; }
        
        .fulfill-option {
            flex: 1;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.15s;
        }
        
        .fulfill-option.selected {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        
        .fulfill-option svg { width: 28px; height: 28px; margin: 0 auto 8px; display: block; }
        
        .loyalty-box {
            display: none;
            margin-top: 16px;
            padding: 16px;
            border-radius: 12px;
            background: linear-gradient(135deg, #fef3c7, #fff7ed);
            border: 1px solid #fbbf24;
        }
        
        body.dark .loyalty-box { background: linear-gradient(135deg, #451a03, #422006); border-color: #92400e; }
        
        .loyalty-pts { font-size: 28px; font-weight: 900; color: #d97706; }
        .loyalty-label { font-size: 12px; color: #92400e; font-weight: 600; }
        body.dark .loyalty-label { color: #fbbf24; }
        
        .use-pts-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #92400e;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.5);
        }
        
        body.dark .use-pts-label { color: #fbbf24; background: rgba(0,0,0,0.3); }
        
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .summary-row.total { font-size: 20px; font-weight: 900; padding-top: 12px; border-top: 1px solid var(--border); margin-top: 4px; }
        .summary-muted { color: var(--text-muted); }
        .summary-discount { color: #d97706; font-weight: 700; }
        .earn-note { text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
        .earn-pts { color: var(--primary); font-weight: 800; }
        
        .checkout-submit {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: #111;
            color: white;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        body.dark .checkout-submit { background: white; color: #111; }
        .checkout-submit:hover { opacity: 0.85; }
        .checkout-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .guest-banner {
            padding: 16px 20px;
            background: var(--primary-light);
            border-left: 4px solid var(--primary);
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 0;
        }
        
        .guest-banner-text h4 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .guest-banner-text p { font-size: 12px; color: var(--text-muted); }
        
        /* === TRACK & REWARDS === */
        .centered-view { max-width: 560px; margin: 0 auto; text-align: center; }
        .view-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
        .view-subtitle { color: var(--text-muted); margin-bottom: 32px; }
        
        .search-row { display: flex; gap: 10px; margin-bottom: 24px; }
        
        .search-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface-solid);
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            font-family: inherit;
        }
        
        .search-input:focus { border-color: var(--primary); }
        
        .result-card {
            background: var(--surface-solid);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: left;
            display: none;
        }
        
        .status-badge {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-pending { background: #f3f4f6; color: #6b7280; }
        .status-preparing { background: #dbeafe; color: #1d4ed8; }
        .status-ready, .status-completed { background: #dcfce7; color: #16a34a; }
        .status-cancelled { background: #fee2e2; color: #dc2626; }
